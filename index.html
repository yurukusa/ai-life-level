  },
  {
    max: 32, cls: 'diff-hardcore', icon: '☠️',
    level: 'DIFFICULTY', title: 'Hardcore Mode',
    subtitle: 'Life has become a hardcore game. AI is the center of everything. Your schedule revolves around AI. You are a legendary player.',
    flavor: 'No save points. No extra lives. But it\'s fun.'
  }
];

function t(ja, en) { return lang === 'ja' ? ja : en; }
function getQuestions() { return lang === 'ja' ? Q_JA : Q_EN; }
function getResults() { return lang === 'ja' ? RESULTS_JA : RESULTS_EN; }

function toggleLang() {
  lang = lang === 'ja' ? 'en' : 'ja';
  document.getElementById('lang-btn').textContent = lang === 'ja' ? 'English' : '日本語';
  document.documentElement.lang = lang;

  document.querySelectorAll('[data-' + lang + ']').forEach(el => {
    el.textContent = el.getAttribute('data-' + lang);
  });

  // Re-render current question if in quiz
  if (!document.getElementById('quiz-section').classList.contains('hidden')) {
    renderQuestion();
  }

  // Re-render result if showing
  if (document.getElementById('result-screen').style.display === 'block' && resultData) {
    showResult();
  }
}

function startQuiz() {
  currentQ = 0;
  scores = [];
  resultData = null;
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('quiz-section').classList.remove('hidden');
  document.getElementById('result-screen').style.display = 'none';
  renderQuestion();
}

function renderQuestion() {
  const questions = getQuestions();
  const q = questions[currentQ];
  const area = document.getElementById('question-area');
  const pct = Math.round(((currentQ + 1) / questions.length) * 100);

  document.getElementById('progress-text').textContent = (currentQ + 1) + ' / ' + questions.length;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  const keys = ['A', 'B', 'C', 'D'];
  let html = '<div class="question-card">';
  html += '<div class="q-number">Q' + (currentQ + 1) + ' — ' + q.cat + '</div>';
  html += '<div class="q-text">' + q.text + '</div>';
  html += '<div class="options">';
  q.options.forEach((opt, i) => {
    html += '<button class="option-btn" onclick="answer(' + opt.score + ')">' +
      '<span class="opt-key">' + keys[i] + '</span>' +
      '<span>' + opt.text + '</span>' +
      '</button>';
  });
  html += '</div></div>';
  area.innerHTML = html;
}

function answer(score) {
  scores.push(score);
  currentQ++;

  const questions = getQuestions();
  if (currentQ >= questions.length) {
    calculateResult();
  } else {
    renderQuestion();
  }
}

function calculateResult() {
  const total = scores.reduce((a, b) => a + b, 0);
  const results = getResults();
  let result = results[results.length - 1];
  for (const r of results) {
    if (total <= r.max) { result = r; break; }
  }
  resultData = { total, maxScore: 32, result, scores };
  showResult();
}

function showResult() {
  const { total, maxScore, result } = resultData;

  document.getElementById('quiz-section').classList.add('hidden');
  document.getElementById('result-screen').style.display = 'block';

  const card = document.getElementById('result-card');
  card.className = 'result-difficulty ' + result.cls;
  document.getElementById('r-icon').textContent = result.icon;
  document.getElementById('r-level').textContent = result.level;
  document.getElementById('r-title').textContent = result.title;
  document.getElementById('r-subtitle').textContent = result.subtitle;

  // Score breakdown
  const questions = getQuestions();
  const cats = questions.map((q, i) => ({ cat: q.cat, score: resultData.scores[i], max: Math.max(...q.options.map(o => o.score)) }));
  const colors = ['var(--green)', 'var(--blue)', 'var(--accent)', 'var(--orange)', 'var(--red)', 'var(--crimson)', 'var(--gold)'];

  let sbHtml = '<div class="sb-title">' + t('スコア内訳', 'Score Breakdown') + ' — ' + total + '/' + maxScore + '</div>';
  cats.forEach((c, i) => {
    const pct = c.max > 0 ? Math.round((c.score / c.max) * 100) : 0;
    sbHtml += '<div class="sb-bar">' +
      '<div class="sb-bar-label"><span>' + c.cat + '</span><span>' + c.score + '/' + c.max + '</span></div>' +
      '<div class="sb-bar-track"><div class="sb-bar-fill" style="width:' + pct + '%;background:' + colors[i] + '"></div></div>' +
      '</div>';
  });
  sbHtml += '<div style="text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--text-dim);font-style:italic">' + result.flavor + '</div>';
  document.getElementById('score-breakdown').innerHTML = sbHtml;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function shareTwitter() {
  if (!resultData) return;
  const { total, result } = resultData;
  const text = t(
    'AI Life Level: ' + result.title + '（' + total + '/32）\n' +
    result.flavor + '\n\n' +
    'あなたのAI生活難易度は？',
    'AI Life Level: ' + result.title + ' (' + total + '/32)\n' +
    result.flavor + '\n\n' +
    'What\'s your AI life difficulty?'
  );
  const url = 'https://yurukusa.github.io/ai-life-level/';
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(url), '_blank');
}

function copyResult() {
  if (!resultData) return;
  const { total, result } = resultData;
  const text = 'AI Life Level\n' +
    result.icon + ' ' + result.title + ' (' + total + '/32)\n' +
    result.subtitle + '\n\n' +
    'https://yurukusa.github.io/ai-life-level/';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.share-btn.copy');
    const orig = btn.textContent;
    btn.textContent = lang === 'ja' ? 'コピー完了!' : 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function retry() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
